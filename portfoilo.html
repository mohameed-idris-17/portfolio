<html lang="en">
<head>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->

  <style>
    :root{
      --bg:#070b14;
      --card:rgba(255,255,255,0.07);
      --border:rgba(255,255,255,0.1);
      --text:#ffffff;
      --sub:#bfc7d5;
      --accent:#00e5ff;
      --accent2:#7b61ff;
      --shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    body.light{
      --bg:#eef3ff;
      --card:rgba(255,255,255,0.7);
      --border:rgba(0,0,0,0.08);
      --text:#111827;
      --sub:#4b5563;
      --accent:#2563eb;
      --accent2:#9333ea;
      --shadow:0 10px 35px rgba(0,0,0,0.08);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
      transition:0.4s ease;
    }

    body::before{
      content:'';
      position:fixed;
      width:700px;
      height:700px;
      background:radial-gradient(circle,var(--accent2),transparent 70%);
      top:-250px;
      left:-250px;
      opacity:0.15;
      z-index:-2;
      animation:float1 10s infinite alternate;
    }

    body::after{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle,var(--accent),transparent 70%);
      bottom:-250px;
      right:-250px;
      opacity:0.12;
      z-index:-2;
      animation:float2 12s infinite alternate;
    }

    @keyframes float1{
      from{transform:translateY(0px);}
      to{transform:translateY(50px);}
    }

    @keyframes float2{
      from{transform:translateX(0px);}
      to{transform:translateX(-50px);}
    }

    .loader{
      position:fixed;
      inset:0;
      background:#05070d;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      transition:1s;
    }

    .loader.hidden{
      opacity:0;
      visibility:hidden;
    }

    .spinner{
      width:70px;
      height:70px;
      border:5px solid rgba(255,255,255,0.1);
      border-top:5px solid var(--accent);
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    .container{
      width:min(1200px,90%);
      margin:auto;
    }

    section{
      padding:100px 0;
    }

    .section-title{
      font-size:2.6rem;
      font-weight:800;
      margin-bottom:15px;
      text-align:center;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .section-sub{
      text-align:center;
      color:var(--sub);
      margin-bottom:60px;
      line-height:1.7;
    }

    nav{
      position:fixed;
      top:0;
      width:100%;
      z-index:999;
      backdrop-filter:blur(15px);
      background:rgba(0,0,0,0.2);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .nav-inner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 0;
    }

    .logo{
      font-size:1.4rem;
      font-weight:800;
      letter-spacing:1px;
    }

    .logo span{
      color:var(--accent);
    }

    .nav-links{
      display:flex;
      gap:25px;
      align-items:center;
    }

    .nav-links a{
      color:var(--text);
      text-decoration:none;
      font-size:0.95rem;
      transition:0.3s;
    }

    .nav-links a:hover{
      color:var(--accent);
    }

    .theme-btn{
      width:42px;
      height:42px;
      border-radius:50%;
      border:none;
      background:var(--card);
      color:var(--text);
      cursor:pointer;
      backdrop-filter:blur(10px);
      border:1px solid var(--border);
      transition:0.3s;
    }

    .theme-btn:hover{
      transform:translateY(-3px);
    }

    .menu-btn{
      display:none;
      font-size:1.5rem;
      cursor:pointer;
    }

    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
      position:relative;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:60px;
      align-items:center;
    }

    .hero-text h3{
      color:var(--accent);
      font-size:1rem;
      margin-bottom:15px;
      letter-spacing:2px;
    }

    .hero-text h1{
      font-size:4rem;
      line-height:1.1;
      margin-bottom:20px;
      font-weight:900;
    }

    .hero-text h1 span{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .typing{
      font-size:1.3rem;
      margin-bottom:20px;
      color:var(--sub);
      min-height:40px;
    }

    .hero-text p{
      color:var(--sub);
      line-height:1.9;
      margin-bottom:30px;
      max-width:650px;
    }

    .hero-btns{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .btn{
      padding:15px 28px;
      border-radius:14px;
      text-decoration:none;
      font-weight:600;
      transition:0.4s;
      display:inline-flex;
      align-items:center;
      gap:10px;
      border:1px solid transparent;
    }

    .btn-primary{
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      color:white;
    }

    .btn-primary:hover{
      transform:translateY(-4px);
      box-shadow:0 10px 30px rgba(0,229,255,0.25);
    }

    .btn-outline{
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);
      backdrop-filter:blur(15px);
    }

    .btn-outline:hover{
      border-color:var(--accent);
      transform:translateY(-4px);
    }

    .glass{
      background:var(--card);
      border:1px solid var(--border);
      backdrop-filter:blur(18px);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    .hero-visual{
      position:relative;
    }

    .hero-card{
      padding:35px;
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:'';
      position:absolute;
      width:200px;
      height:200px;
      background:linear-gradient(var(--accent),transparent);
      top:-80px;
      right:-80px;
      opacity:0.2;
      border-radius:50%;
    }

    .hero-visual img{
      width:100%;
      border-radius:20px;
    }

    .icon-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:18px;
      margin-top:25px;
    }

    .icon-box{
      padding:20px;
      border-radius:18px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      transition:0.3s;
    }

    .icon-box:hover{
      transform:translateY(-6px);
      border-color:var(--accent);
    }

    .icon-box i{
      font-size:1.6rem;
      color:var(--accent);
      margin-bottom:12px;
    }

   .about-grid{
  display:grid;
  grid-template-columns:3fr 1.2fr;
  gap:40px;
}
   .contact-grid{
  display:flex;
  justify-content:center;
}

    .card{
      padding:35px;
    }

    .card h3{
      margin-bottom:20px;
      font-size:1.5rem;
    }

    .card p{
      line-height:1.9;
      color:var(--sub);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-top:25px;
    }

    .stat{
      text-align:center;
      padding:20px;
      border-radius:18px;
      background:rgba(255,255,255,0.04);
    }

    .stat h2{
      color:var(--accent);
      margin-bottom:5px;
      font-size:2rem;
    }

    .skills-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    }

    .skill-card{
      padding:25px;

    }

    .skill-card:hover{
      transform:translateY(-8px);
    }

      display:flex;
      justify-content:space-between;
      margin-bottom:12px;
    }

    .progress{

      height:10px;
      border-radius:10px;
      background:rgba(255,255,255,0.08);
      overflow:hidden;
    }

    .progress-bar{
      height:100%;
      border-radius:10px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      animation:grow 2s ease;
    }

    @keyframes grow{
      from{width:0;}
    }

    .projects-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:30px;
    }

    .project-card{
      overflow:hidden;
      transition:0.4s;
    }

    .project-card:hover{
      transform:translateY(-10px);
    }

    .project-banner{
      height:220px;
      background:linear-gradient(135deg,#0f172a,#111827);

    .features{

      display:flex;

      color:var(--sub);
    }

      color:var(--accent);
    }

 .timeline{
  position:relative;
  max-width:900px;
  margin:auto;
}

  .timeline::before{
  content:'';
  position:absolute;
  width:3px;
  background:linear-gradient(var(--accent),var(--accent2));
  top:0;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
}

    .timeline-item{
      width:50%;
      padding:20px 40px;
      position:relative;
    }

    .timeline-item:nth-child(odd){
      left:0;
      text-align:right;
    }

    .timeline-item:nth-child(even){
      left:50%;
    }

    .timeline-dot{
      position:absolute;
      width:18px;
      height:18px;
      border-radius:50%;
      background:var(--accent);
      top:40px;
      right:-10px;
    }

    .timeline-item:nth-child(even) .timeline-dot{
      left:-8px;
    }

    .timeline-card{
      padding:28px;
    }

    .timeline-card h3{
      margin-bottom:8px;
    }

    .timeline-card span{
      color:var(--accent);
      font-size:0.9rem;
    }

    .timeline-card p{
      margin-top:15px;
      color:var(--sub);
      line-height:1.8;
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .mini-card{
      padding:28px;
      transition:0.4s;
      text-align:center;
    }

    .mini-card:hover{
      transform:translateY(-8px);
    }

    .mini-card i{
      font-size:2rem;
      margin-bottom:18px;
      color:var(--accent);
    }

    .mini-card p{
      color:var(--sub);
      line-height:1.8;
    }

    .github-stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .stat-box{
      padding:30px;
      text-align:center;
    }

    .stat-box h2{
      font-size:3rem;
      color:var(--accent);
      margin-bottom:10px;
    }

    .coding-links{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
      justify-content:center;
    }

    .profile-link{
      padding:18px 24px;
      border-radius:18px;
      text-decoration:none;
      color:var(--text);
      display:flex;
      gap:14px;
      align-items:center;
      transition:0.4s;
    }

    .profile-link:hover{
      transform:translateY(-6px);
      border-color:var(--accent);
    }

    .profile-link i{
      font-size:1.5rem;
      color:var(--accent);
    }

    .contact-card{
  max-width:700px;
  width:100%;
}

    .contact-item{
      display:flex;
      gap:18px;
      margin-bottom:25px;
      align-items:flex-start;
    }

    .contact-item i{
      width:50px;
      height:50px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.06);
      color:var(--accent);
      font-size:1.2rem;
    }

    .contact-item h4{
      margin-bottom:6px;
    }

    .contact-item p,a{
      color:var(--sub);
      text-decoration:none;
    }

    footer{
      padding:35px 0;
      border-top:1px solid rgba(255,255,255,0.08);
      text-align:center;
      color:var(--sub);
    }

    .reveal{
      opacity:0;
      transform:translateY(60px);
      transition:1s ease;
    }

    .reveal.active{
      opacity:1;
      transform:translateY(0);
    }

    @media(max-width:992px){

      .hero-grid,
      .about-grid,
      .contact-grid{
        display:flex;
      gap:18px;
        grid-template-columns:3fr;
      }

      .hero{
        padding-top:120px;
      }

      .hero-text h1{
        font-size:3rem;
      }

      .timeline::before{
        left:20px;
      }

      .timeline-item{
        width:100%;
        padding-left:70px;
        padding-right:10px;
        left:0 !important;
        text-align:left !important;
      }

      .timeline-dot{
        left:12px !important;
      }
    }

    @media(max-width:768px){

      .nav-links{
        position:absolute;
        top:80px;
        right:20px;
        flex-direction:column;
        background:rgba(0,0,0,0.85);
        width:250px;
        padding:25px;
        border-radius:20px;

      }

      .nav-links.active{
        display:flex;
      }

      .menu-btn{
        display:block;
      }

      .hero-text h1{
        font-size:2.4rem;
      }

      .section-title{
        font-size:2rem;
      }

      .stats{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>
